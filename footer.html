<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── Hamburger toggle ──
const hamburger = document.getElementById('hamburger');
const mobileNav = document.getElementById('mobile-nav');

hamburger.addEventListener('click', () => {
hamburger.classList.toggle('open');
mobileNav.classList.toggle('open');
});

function closeMobileNav() {
hamburger.classList.remove('open');
mobileNav.classList.remove('open');
}

// ── Track order ──
function goTrack() {
const val = document.getElementById('orderInput').value.trim();
if (val) {
window.location.href = 'tracking.html?order=' + encodeURIComponent(val);
} else {
window.location.href = 'tracking.html';
}
}

document.getElementById('orderInput').addEventListener('keydown', e => {
if (e.key === 'Enter') goTrack();
});

// ── Smooth scroll ──
document.querySelectorAll('a[href^="#"]').forEach(link => {
link.addEventListener('click', function (e) {
const target = document.querySelector(this.getAttribute('href'));
if (!target) return;
e.preventDefault();
const navH = document.querySelector('header').offsetHeight;
const top = target.getBoundingClientRect().top + window.scrollY - navH - 8;
window.scrollTo({ top, behavior: 'smooth' });
});
});

// ── Active nav on scroll ──
const sections = [
{ id: 'hero' },
{ id: 'cek-antrian' },
{ id: 'cara-kerja' },
{ id: 'testimoni' },
{ id: 'kontak' },
 ];

function updateActiveNav() {
const header = document.querySelector('header');
if (!header) return; // Guard clause

const navH = header.offsetHeight;
const navLinksDesktop = document.querySelectorAll('nav ul li a');
const navLinksMobile = document.querySelectorAll('.mobile-nav ul li a:not(.mobile-login)');

let current = 'hero';
sections.forEach(s => {
const el = document.getElementById(s.id);
if (el && window.scrollY >= el.offsetTop - navH - 40) current = s.id;
});

navLinksDesktop.forEach(a => {
a.classList.remove('active');
if (a.getAttribute('href') === '#' + current) a.classList.add('active');
});

navLinksMobile.forEach(a => {
a.classList.remove('active');
if (a.getAttribute('href') === '#' + current) a.classList.add('active');
});
}
window.addEventListener('scroll', updateActiveNav);
updateActiveNav();

// ── Fade-up on scroll ──
const fadeEls = document.querySelectorAll('.fade-up');
const fadeObserver = new IntersectionObserver((entries) => {
entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.12 });
fadeEls.forEach(el => fadeObserver.observe(el));
</script>
