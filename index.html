<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laundry Kita</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    /* Tambahkan style dasar agar tidak berantakan */
    body { padding-top: 60px; }
    .nav-wrapper { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>

  <!-- HEADER KAMU -->
  <header>
    <div class="container nav-wrapper">
      <div class="logo">LAUNDRY<span>KITA</span></div>
      <nav>
        <ul>
          <li><a href="#hero" class="active">Home</a></li>
          <li><a href="#cara-kerja">Layanan</a></li>
          <li><a href="#cek-antrian">Antrian</a></li>
          <li><a href="#kontak">Kontak</a></li>
        </ul>
      </nav>
      <button class="btn-login">Login</button>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-nav" id="mobile-nav">
      <ul>
        <li><a href="#hero" onclick="closeMobileNav()">Home</a></li>
        <li><a href="#cara-kerja" onclick="closeMobileNav()">Layanan</a></li>
        <li><a href="#cek-antrian" onclick="closeMobileNav()">Antrian</a></li>
        <li><a href="#kontak" onclick="closeMobileNav()">Kontak</a></li>
        <li><a href="#" class="mobile-login" onclick="closeMobileNav()">Login</a></li>
      </ul>
    </div>
  </header>

  <!-- KONTEN UTAMA (Silakan isi section konten kamu di sini) -->
  <main style="min-height: 500px; padding: 20px;">
    <h1>Selamat Datang di Laundry Kita</h1>
    <p>Ini adalah website asli saya.</p>
  </main>

  <!-- FOOTER KAMU -->
  <footer id="kontak">
    <div class="footer-inner">
      <p class="footer-brand">LAUNDRY<span>KITA</span></p>
      <p class="footer-tagline">Bersih, Cepat & Praktis — Antar Jemput Gratis!</p>
      <div class="footer-social">
        <a href="tel:+62000000000" aria-label="Phone" title="Telepon"><i class="ri-phone-line"></i></a>
        <a href="https://wa.me/62000000000" aria-label="WhatsApp" title="WhatsApp"><i class="ri-whatsapp-line"></i></a>
        <a href="https://www.google.com/maps" aria-label="Lokasi" title="Lokasi"><i class="ri-map-pin-line"></i></a>
        <a href="https://www.instagram.com/" aria-label="Instagram" title="Instagram"><i class="ri-instagram-line"></i></a>
        <a href="https://www.facebook.com/" aria-label="Facebook" title="Facebook"><i class="ri-facebook-circle-fill"></i></a>
      </div>
      <p class="footer-copy">© 2026 LaundryKita. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Kode interaktif kamu
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobile-nav');
    if(hamburger) {
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('open');
            mobileNav.classList.toggle('open');
        });
    }
  </script>
</body>
</html>
